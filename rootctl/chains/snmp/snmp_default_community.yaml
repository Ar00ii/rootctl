chain_id: snmp_default_community
title: "SNMP — default community strings to walk the MIB"
severity: HIGH
tags: [snmp, recon, default-creds, mib-walk]

trigger:
  any_of:
    - { port: 161 }
    - { service: snmp }
    - { service_pattern: "(?i)snmp" }

description: |
  Open SNMP. `public` and `private` communities still ship as defaults
  in lots of network gear. A walk of the MIB hands you running processes,
  installed software, listening ports, ARP table, and — on Windows —
  often the local user list and even password fields stored in plaintext.

steps:
  - id: 1
    title: "Confirm SNMP responds and which community works"
    command: |
      onesixtyone -c /usr/share/wordlists/seclists/Discovery/SNMP/common-snmp-community-strings.txt $VICTIMA

  - id: 2
    title: "Walk the entire MIB"
    command: snmpwalk -c public -v 1 $VICTIMA

  - id: 3
    title: "Targeted Windows MIB walks (users + processes + listening ports)"
    command: |
      snmpwalk -c public -v 1 $VICTIMA 1.3.6.1.4.1.77.1.2.25      # users
      snmpwalk -c public -v 1 $VICTIMA 1.3.6.1.2.1.25.4.2.1.2     # processes
      snmpwalk -c public -v 1 $VICTIMA 1.3.6.1.2.1.6.13.1.3       # listening TCP ports
      snmpwalk -c public -v 1 $VICTIMA 1.3.6.1.2.1.25.6.3.1.2     # software

  - id: 4
    title: "Use snmp-check for a digestible summary"
    command: snmp-check $VICTIMA -c public

references:
  - https://book.hacktricks.xyz/network-services-pentesting/pentesting-snmp
